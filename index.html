<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Romero Panificados</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <!-- FONDO -->
    <div class="bg-gradient"></div>
    <div class="bg-lines"></div>

    <div class="login-container">
        <img src="https://www.romeropanificados.com.ar/wp-content/uploads/2023/01/Recurso-8.png"
             alt="Romero Panificados" class="header-icon">

        <hr class="divider">

        <!-- SELECCIÓN DE ROL -->
        <p class="roles-label">Seleccioná tu rol</p>
        <div class="roles-grid">
            <div class="rol-btn" onclick="seleccionarRol('admin', this)">
                <span class="rol-icon">🔑</span>
                <span class="rol-nombre">Admin</span>
            </div>
            <div class="rol-btn" onclick="seleccionarRol('supervisor', this)">
                <span class="rol-icon">⭐</span>
                <span class="rol-nombre">Supervisor</span>
            </div>
            <div class="rol-btn" onclick="seleccionarRol('operario', this)">
                <span class="rol-icon">⚙️</span>
                <span class="rol-nombre">Operario</span>
            </div>
            <div class="rol-btn" onclick="seleccionarRol('ventas', this)">
                <span class="rol-icon">📊</span>
                <span class="rol-nombre">Ventas</span>
            </div>
            <div class="rol-btn" onclick="seleccionarRol('romero', this)">
                <span class="rol-icon">👁️</span>
                <span class="rol-nombre">Romero</span>
            </div>
            <div class="rol-btn" onclick="seleccionarRol('calidad', this)">
                <span class="rol-icon">🔬</span>
                <span class="rol-nombre">Calidad</span>
            </div>
        </div>

        <!-- FORMULARIO -->
        <form id="loginForm" action="#" method="post">
            <div class="form-body" id="formBody">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <!-- Solo visible para Supervisor -->
                <div class="supervisor-group" id="supervisorGroup">
                    <label for="supervisor">Supervisor de Turno</label>
                    <select id="supervisor" name="supervisor">
                        <option value="" disabled selected>-- Seleccioná un Supervisor --</option>
                        <option value="Angel Rene">Angel Rene</option>
                        <option value="Juan Aranzabal">Juan Aranzabal</option>
                        <option value="Adrian Farias">Adrian Farias</option>
                    </select>
                </div>

                <button type="submit" id="btnIngresar">Iniciar Sesión</button>
            </div>
        </form>

        <p id="loginMessage"></p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="login.js"></script>
</body>
</html>
